<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Astro Calendar Май 2026</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;

      background:
        radial-gradient(circle at top left, rgba(255, 210, 232, 0.95), transparent 34%),
        radial-gradient(circle at bottom right, rgba(255, 176, 215, 0.8), transparent 38%),
        linear-gradient(180deg, #fff2f8 0%, #ffe1ef 100%);

      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;

      color: #3a2430;
    }

    .card {
      width: 100%;
      max-width: 430px;

      background: rgba(255, 255, 255, 0.92);

      border-radius: 32px;

      padding: 34px 24px 28px;

      text-align: center;

      box-shadow: 0 22px 55px rgba(210, 83, 142, 0.22);

      border: 1px solid rgba(255, 255, 255, 0.9);
    }

    .badge {
      display: inline-block;

      margin-bottom: 18px;

      padding: 9px 14px;

      border-radius: 999px;

      background: #fff0f7;

      color: #b83d7a;

      font-size: 14px;

      font-weight: 700;
    }

    .emoji {
      font-size: 46px;

      margin-bottom: 12px;
    }

    h1 {
      margin: 0 0 14px;

      font-size: 30px;

      line-height: 1.15;

      color: #2d1d27;
    }

    p {
      margin: 0 0 24px;

      font-size: 16px;

      line-height: 1.55;

      color: #6a4a5a;
    }

    .channel {
      margin: 0 0 26px;

      padding: 16px;

      border-radius: 22px;

      background: #fff4fa;

      color: #9f2f69;

      font-size: 16px;

      font-weight: 700;

      border: 1px solid #ffd2e7;
    }

    .button {
      display: block;

      width: 100%;

      padding: 18px 20px;

      border-radius: 20px;

      background: linear-gradient(135deg, #ff6fb1 0%, #d94f91 100%);

      color: #ffffff;

      text-decoration: none;

      font-size: 18px;

      font-weight: 800;

      box-shadow: 0 12px 28px rgba(217, 79, 145, 0.38);
    }

    .button:active {
      transform: scale(0.98);
    }

    .small {
      margin-top: 18px;

      font-size: 13px;

      color: #9b7b8a;
    }
  </style>
</head>

<body>

  <main class="card">

    <div class="badge">
      ТГ-канал: Танюшка в Матрице
    </div>

    <div class="emoji">
      🌙
    </div>

    <h1>
      Astro Calendar
      <br>
      Май 2026
    </h1>

    <p>
      Добавьте астрологический календарь в iPhone и сверяйтесь с ключевыми датами
      для денег, масштаба, блога и личной энергии.
    </p>

    <div class="channel">
      Автор календаря — Танюшка в Матрице
    </div>

    <a
      class="button"
      href="webcal://raw.githubusercontent.com/tatiana170696-arch/astro-calendar/main/astro-calendar.ics"
    >
      Добавить календарь в iPhone
    </a>

    <p class="small">
      Лучше открывать через Safari на iPhone.
    </p>

  </main>

</body>
</html>
