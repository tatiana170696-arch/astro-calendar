<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Astro Calendar Май 2026</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
      background: linear-gradient(180deg, #dff4ff 0%, #f6fbff 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #1f2a44;
    }

    .card {
      width: 100%;
      max-width: 430px;
      background: #ffffff;
      border-radius: 28px;
      padding: 32px 24px;
      text-align: center;
      box-shadow: 0 18px 45px rgba(68, 128, 168, 0.18);
    }

    .emoji {
      font-size: 44px;
      margin-bottom: 12px;
    }

    h1 {
      margin: 0 0 12px;
      font-size: 28px;
      line-height: 1.2;
    }

    p {
      margin: 0 0 24px;
      font-size: 16px;
      line-height: 1.55;
      color: #4b5b73;
    }

    .button {
      display: block;
      width: 100%;
      padding: 18px 20px;
      border-radius: 18px;
      background: #74c7ee;
      color: #ffffff;
      text-decoration: none;
      font-size: 18px;
      font-weight: 700;
      box-shadow: 0 10px 24px rgba(116, 199, 238, 0.42);
    }

    .button:active {
      transform: scale(0.98);
    }

    .small {
      margin-top: 18px;
      font-size: 13px;
      color: #7a8ba3;
    }
  </style>
</head>
<body>
  <main class="card">
    <div class="emoji">🌙</div>
    <h1>Astro Calendar<br>Май 2026</h1>
    <p>
      Добавьте астрологический календарь в iPhone и получайте подсказки
      по ключевым датам месяца.
    </p>

    <a class="button" href="webcal://raw.githubusercontent.com/tatiana170696-arch/astro-calendar/main/astro-calendar.ics">
      Добавить календарь в iPhone
    </a>

    <p class="small">
      Если кнопка не открылась, попробуйте открыть эту страницу через Safari на iPhone.
    </p>
  </main>
</body>
</html>
